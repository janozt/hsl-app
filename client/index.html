<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Canal de Denuncias HSL - JANOZ</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    :root { --primary: #075E54; --secondary: #25D366; --bg: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
    body { background: var(--bg); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; color: #333; }
    .app { background: white; width: 100%; max-width: 850px; border-radius: 20px; box-shadow: 0 15px 40px rgba(0,0,0,0.3); overflow: hidden; display: flex; flex-direction: column; height: 90vh; max-height: 750px; }
    .screen { display: none; flex: 1; flex-direction: column; overflow: hidden; }
    .screen.active { display: flex; }
    
    .header { background: var(--primary); color: white; padding: 15px 20px; display: flex; align-items: center; justify-content: space-between; }
    .header h2 { font-size: 18px; }
    .btn-back { background: none; border: none; color: white; font-size: 20px; cursor: pointer; }
    
    .home { padding: 40px 20px; text-align: center; flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; }
    .logo { max-height: 100px; margin-bottom: 20px; }
    .title { color: var(--primary); margin-bottom: 10px; }
    .btn { padding: 14px 28px; border: none; border-radius: 50px; font-size: 16px; font-weight: bold; cursor: pointer; margin: 10px; color: white; transition: 0.3s; display: inline-flex; align-items: center; gap: 8px; }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
    .btn-green { background: var(--secondary); }
    .btn-blue { background: #34b7f1; }
    .btn-grey { background: #ccc; color: #333; }
    .admin-link { margin-top: 30px; font-size: 12px; color: #999; text-decoration: none; }
    
    .form-content { padding: 20px; overflow-y: auto; }
    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; margin-bottom: 6px; font-weight: 600; font-size: 14px; }
    .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; font-size: 15px; }
    .btn-submit { width: 100%; padding: 14px; background: var(--secondary); color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; }
    
    .admin-content { padding: 20px; overflow-y: auto; background: #f8f9fa; height: 100%; }
    .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 20px; }
    .stat-card { background: white; padding: 15px; border-radius: 12px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
    .stat-val { font-size: 24px; font-weight: bold; color: var(--primary); }
    .stat-lab { font-size: 11px; color: #888; text-transform: uppercase; }
    
    .controls { background: white; padding: 15px; border-radius: 12px; margin-bottom: 20px; display: flex; gap: 10px; flex-wrap: wrap; }
    .search { flex: 1; padding: 10px; border: 2px solid #eee; border-radius: 8px; }
    .filter-btn { padding: 6px 12px; border: 1px solid #ddd; background: white; border-radius: 15px; cursor: pointer; font-size: 12px; }
    .filter-btn.active { background: var(--primary); color: white; border-color: var(--primary); }
    
    .case-card { background: white; padding: 15px; border-radius: 12px; margin-bottom: 12px; cursor: pointer; border-left: 4px solid var(--secondary); transition: 0.2s; }
    .case-card:hover { transform: translateX(5px); box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
    .case-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
    .case-id { font-weight: bold; color: var(--primary); font-family: monospace; }
    .badge { padding: 3px 8px; border-radius: 10px; font-size: 10px; font-weight: bold; color: white; }
    .badge.pending { background: orange; } .badge.in_review { background: #34b7f1; } .badge.resolved { background: green; }
    .case-meta { font-size: 12px; color: #888; margin-top: 5px; display: flex; gap: 12px; }
    
    .details { padding: 20px; overflow-y: auto; background: white; }
    .detail-box { background: #f8f9fa; padding: 15px; border-radius: 10px; margin-bottom: 15px; }
    .detail-title { font-weight: bold; color: var(--primary); margin-bottom: 8px; display: flex; align-items: center; gap: 8px; }
    .evidence-item { background: white; padding: 10px; border-radius: 8px; border: 1px solid #ddd; margin-bottom: 8px; display: flex; align-items: center; gap: 10px; cursor: pointer; }
    .evidence-item:hover { background: #f0f4f8; }
    .evidence-item i { font-size: 24px; color: var(--primary); }
    
    .actions { padding: 15px; background: #e9ecef; display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
    .btn-act { padding: 8px 15px; border: none; border-radius: 20px; font-size: 12px; font-weight: bold; cursor: pointer; color: white; }
    .login-box { display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100%; padding: 30px; }
  </style>
</head>
<body>

<div class="app">
  <!-- INICIO -->
  <div id="screen-home" class="screen active">
    <div class="home">
      <img src="img/logo.png" alt="JANOZ" class="logo">
      <h1 class="title">Canal de Denuncias HSL</h1>
      <p style="color:#666; margin-bottom:25px;">JANOZ CONTRATISTAS GENERALES S.A.C</p>
      <button class="btn btn-green" onclick="showScreen('screen-form')"><i class="fas fa-file-alt"></i> Presentar Denuncia</button>
      <a href="#" onclick="showScreen('screen-login')" class="admin-link">Acceso RR.HH.</a>
    </div>
  </div>

  <!-- FORMULARIO -->
  <div id="screen-form" class="screen">
    <div class="header"><button class="btn-back" onclick="showScreen('screen-home')"><i class="fas fa-arrow-left"></i></button><h2>Nueva Denuncia</h2><div style="width:20px"></div></div>
    <div class="form-content">
      <div class="form-group"><label>Tipo de Caso:</label>
        <select id="caseType"><option value="Hostigamiento Sexual">Hostigamiento Sexual</option><option value="Hostigamiento Laboral">Hostigamiento Laboral</option><option value="Discriminación">Discriminación</option><option value="Otro">Otro</option></select>
      </div>
      <div class="form-group"><label>Descripción de los hechos:</label><textarea id="caseDesc" rows="5" placeholder="Describa detalladamente..."></textarea></div>
      <div class="form-group"><label>Adjuntar evidencias (opcional):</label><input type="file" id="caseFiles" multiple accept="image/*,video/*,.pdf,.doc,.docx"></div>
      <button class="btn-submit" id="btnSubmit" onclick="submitCase()">Enviar y Continuar a WhatsApp</button>
    </div>
  </div>

  <!-- DETALLES CASO (ADMIN) -->
  <div id="screen-details" class="screen">
    <div class="header"><button class="btn-back" onclick="showScreen('screen-admin')"><i class="fas fa-arrow-left"></i></button><h2 id="det-id">Caso #---</h2><div style="width:20px"></div></div>
    <div class="details" id="det-content"></div>
    <div class="actions" id="det-actions"></div>
  </div>

  <!-- LOGIN ADMIN -->
  <div id="screen-login" class="screen">
    <div class="login-box">
      <h2 style="margin-bottom:20px; color:var(--primary);">Acceso RR.HH.</h2>
      <div class="form-group" style="width:100%"><input type="password" id="adminPass" placeholder="Contraseña" style="text-align:center"></div>
      <button class="btn btn-blue" style="width:100%" onclick="loginAdmin()">Ingresar</button>
      <button class="btn btn-grey" style="width:100%; margin-top:10px" onclick="showScreen('screen-home')">Cancelar</button>
    </div>
  </div>

  <!-- PANEL ADMIN -->
  <div id="screen-admin" class="screen">
    <div class="header"><h2>Panel de Casos</h2><button class="btn-back" onclick="showScreen('screen-home')"><i class="fas fa-home"></i></button></div>
    <div class="admin-content" id="admin-panel"></div>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
  const socket = io();
  let currentCaseId = null;
  let allCases = [];
  let currentFilter = 'all';

  function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    if(id === 'screen-admin') loadAdmin();
  }

  // --- ENVIAR DENUNCIA ---
  async function submitCase() {
    const type = document.getElementById('caseType').value;
    const desc = document.getElementById('caseDesc').value;
    if(!desc.trim()) return alert('⚠️ Escriba una descripción');

    const btn = document.getElementById('btnSubmit');
    btn.disabled = true; btn.innerText = 'Enviando...';

    try {
      const res = await fetch('/api/case', {
        method: 'POST', headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ category: type, description: desc })
      });
      const data = await res.json();
      if(data.success) {
        // Subir archivos en segundo plano
        const files = document.getElementById('caseFiles').files;
        if(files.length > 0) {
          const formData = new FormData();
          for(let f of files) formData.append('files', f);
          fetch(`/api/upload/${data.caseId}`, { method: 'POST', body: formData });
        }

        // ⚠️ CAMBIA ESTE NÚMERO POR EL WHATSAPP REAL DE LA EMPRESA
        const PHONE = '51951722365'; 
        const msg = `Hola, he presentado una denuncia a través del Canal HSL. Mi código de seguimiento es: ${data.caseId}. Quedo atento a su respuesta.`;
        window.location.href = `https://wa.me/${PHONE}?text=${encodeURIComponent(msg)}`;
      }
    } catch(e) { alert('Error al enviar'); }
    finally { btn.disabled = false; btn.innerText = 'Enviar y Continuar a WhatsApp'; }
  }

  // --- ADMIN ---
  async function loginAdmin() {
    if(document.getElementById('adminPass').value === 'adminjanozt123') {
      showScreen('screen-admin');
      document.getElementById('adminPass').value = '';
    } else alert('❌ Contraseña incorrecta');
  }

  async function loadAdmin() {
    const panel = document.getElementById('admin-panel');
    panel.innerHTML = '<p style="text-align:center;padding:20px">Cargando...</p>';
    try {
      const [statsRes, casesRes] = await Promise.all([fetch('/api/admin/stats'), fetch('/api/admin/cases')]);
      const stats = await statsRes.json();
      allCases = await casesRes.json();

      panel.innerHTML = `
        <div class="stats">
          <div class="stat-card"><div class="stat-val">${stats.total}</div><div class="stat-lab">Total Casos</div></div>
          <div class="stat-card"><div class="stat-val" style="color:orange">${stats.pending}</div><div class="stat-lab">Pendientes</div></div>
          <div class="stat-card"><div class="stat-val" style="color:#34b7f1">${stats.inReview}</div><div class="stat-lab">En Revisión</div></div>
        </div>
        <div class="controls">
          <input type="text" class="search" placeholder="🔍 Buscar por ID..." oninput="renderList()">
          <button class="filter-btn active" onclick="setFilter('all',this)">Todos</button>
          <button class="filter-btn" onclick="setFilter('pending',this)">Pendientes</button>
          <button class="filter-btn" onclick="setFilter('in_review',this)">En Revisión</button>
          <button class="filter-btn" onclick="setFilter('resolved',this)">Resueltos</button>
        </div>
        <div id="case-list"></div>
      `;
      renderList();
    } catch(e) { panel.innerHTML = '<p style="color:red;text-align:center">Error cargando</p>'; }
  }

  function setFilter(f, btn) {
    currentFilter = f;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderList();
  }

  function renderList() {
    const search = document.querySelector('.search')?.value.toLowerCase() || '';
    const filtered = allCases.filter(c => {
      return (currentFilter === 'all' || c.status === currentFilter) && c.id.toLowerCase().includes(search);
    });
    
    const list = document.getElementById('case-list');
    if(!list) return;
    
    list.innerHTML = filtered.length === 0 ? '<p style="text-align:center;color:#999;padding:20px">No se encontraron casos</p>' : 
      filtered.map(c => {
        const cls = c.status === 'pending' ? 'pending' : (c.status === 'resolved' ? 'resolved' : 'in_review');
        const txt = c.status === 'pending' ? 'Pendiente' : (c.status === 'resolved' ? 'Resuelto' : 'En Revisión');
        return `<div class="case-card" onclick="viewDetails('${c.id}')">
          <div class="case-head"><span class="case-id">${c.id}</span><span class="badge ${cls}">${txt}</span></div>
          <div style="font-size:13px;margin-bottom:4px"><strong>${c.category}</strong></div>
          <div style="font-size:12px;color:#666;margin-bottom:6px">${c.description}</div>
          <div class="case-meta"><span>📅 ${new Date(c.createdAt).toLocaleDateString()}</span>${c.hasFiles?'<span>📎 Archivos</span>':''}</div>
        </div>`;
      }).join('');
  }

  async function viewDetails(id) {
    currentCaseId = id;
    document.getElementById('det-id').innerText = 'Caso ' + id;
    const cont = document.getElementById('det-content');
    cont.innerHTML = '<p style="text-align:center;padding:20px">Cargando...</p>';
    showScreen('screen-details');
    
    try {
      const res = await fetch(`/api/case/${id}`);
      const data = await res.json();
      const c = data.case;
      
      cont.innerHTML = `
        <div class="detail-box">
          <div class="detail-title"><i class="fas fa-info-circle"></i> Información</div>
          <p><strong>Tipo:</strong> ${c.category}</p>
          <p><strong>Estado:</strong> <span class="badge ${c.status}">${c.status}</span></p>
          <p><strong>Fecha:</strong> ${new Date(c.createdAt).toLocaleString()}</p>
        </div>
        <div class="detail-box">
          <div class="detail-title"><i class="fas fa-align-left"></i> Descripción de los Hechos</div>
          <p style="white-space:pre-wrap;line-height:1.6">${c.description}</p>
        </div>
        <div class="detail-box">
          <div class="detail-title"><i class="fas fa-paperclip"></i> Evidencias (${c.files.length})</div>
          ${c.files.length ? c.files.map(f => `<div class="evidence-item" onclick="window.open('/uploads/${f.filename}','_blank')">
            <i class="fas ${f.mimetype?.startsWith('image/') ? 'fa-image' : 'fa-file'}"></i>
            <div><div style="font-weight:600;font-size:13px">${f.originalname}</div><div style="font-size:11px;color:#888">${(f.size/1024).toFixed(2)} KB</div></div>
          </div>`).join('') : '<p style="color:#999;font-size:13px">Sin archivos adjuntos</p>'}
        </div>
      `;
      
      document.getElementById('det-actions').innerHTML = `
        <button class="btn-act" style="background:orange" onclick="updateStatus('pending')">🟡 Pendiente</button>
        <button class="btn-act" style="background:#34b7f1" onclick="updateStatus('in_review')">🔵 En Revisión</button>
        <button class="btn-act" style="background:green" onclick="updateStatus('resolved')">✅ Resuelto</button>
      `;
    } catch(e) { cont.innerHTML = '<p style="color:red;text-align:center">Error</p>'; }
  }

  async function updateStatus(status) {
    if(!confirm(`¿Marcar como ${status}?`)) return;
    try {
      await fetch(`/api/case/${currentCaseId}/status`, {
        method: 'PATCH', headers: {'Content-Type':'application/json'}, body: JSON.stringify({status})
      });
      alert('✅ Estado actualizado');
      showScreen('screen-admin');
    } catch(e) { alert('Error'); }
  }
</script>
</body>
</html>
